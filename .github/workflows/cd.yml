# .github/workflows/cd.yml
# ─────────────────────────────────────────────────────────────────────────────
# CD — Continuous Deployment
# Runs ONLY when a push lands on main AND the CI workflow passes.
# Responsible for: deploying to HuggingFace Spaces.
# Does NOT run tests (CI already did that).
#
# Triggers:
#   • ci.yml completes successfully on main branch
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   HF_TOKEN      → HuggingFace token with WRITE access to your Space
#   HF_SPACE_ID   → e.g. "your-username/loan-scoring-api"

name: CD — Deploy to HuggingFace

on:
  workflow_run:
    workflows: ["CI — Test"]     # exact name from ci.yml
    types: [completed]
    branches: [main]             # only when CI ran on main

jobs:

  deploy:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest

    # Only deploy if CI actually passed — not if it failed or was cancelled
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history needed for git operations
          lfs: true            # fetch Git LFS files (model .pkl, .parquet)

      - name: Configure git identity
        run: |
          git config --global user.email "ci-bot@github-actions"
          git config --global user.name  "GitHub Actions Bot"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api      = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          sha      = os.environ.get("GITHUB_SHA", "unknown")[:7]

          print(f"Deploying commit {sha} to Space: {space_id}")

          api.upload_folder(
              folder_path=".",
              repo_id=space_id,
              repo_type="space",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".venv/*",
                  "**/__pycache__/*",
                  "*.pyc",
                  ".env",
                  "logs/*",
                  "htmlcov/*",
                  ".coverage",
                  "test/*",          # tests not needed on HF Space
                  "ml/artifacts/*",  # model artifacts not needed on HF Space
                  "data/training_data/*",       # raw data not needed on HF Space
                  "data/preprocessed_data/*",         # raw data not needed on HF Space
                  "data/original_data/*",
                  "ml/notebook/*",    # notebooks not needed on HF Space
                  "ml/src/*",   # mlruns not needed on HF Space
                  "ml/model/grid_fbeta_model_bundle.pkl",
                  ".pytest_cache/*",
                  ".ipynb_checkpoints/*",

              ],
              commit_message=f"Deploy {sha} via GitHub Actions",
          )
          print("Upload complete.")
          EOF

      - name: Check Space build status
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'EOF'
          import os, time
          from huggingface_hub import HfApi

          api      = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]

          print("Waiting for Space to start building...")
          time.sleep(10)

          runtime = api.get_space_runtime(space_id)
          print(f"Space stage : {runtime.stage}")

          if runtime.stage in ("BUILDING", "RUNNING", "RUNNING_BUILDING"):
              print("Space is building/running — deploy successful.")
          else:
              print(f"Warning: unexpected stage '{runtime.stage}'")
          EOF